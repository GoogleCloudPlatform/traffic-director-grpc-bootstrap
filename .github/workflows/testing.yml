name: Testing

on:
  pull_request:

permissions:
  contents: read

jobs:
  tests-latest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v3
        with:
          go-version: 1.26.2
      - name: Run tests (latest)
        run: go test -v ./... -buildvcs=true

  tests-earliest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v3
        with:
          go-version: 1.25
      - name: Run tests (latest)
        run: go test -v ./... -buildvcs=true
